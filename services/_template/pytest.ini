# pytest 실행 설정.
#
# 본 파일이 위치한 디렉토리에서 `pytest` 를 실행하면 이 설정이 자동 적용된다.
# 4개 서비스(account/transfer/loan/notification) 도 동일 형식의 pytest.ini 를 가진다.
#
# [중요 옵션]
#   pythonpath = .   : 서비스 루트(`main.py` 가 있는 곳)를 sys.path 에 추가.
#                       tests/test_main.py 가 `from main import app` 으로 가져올 수 있게 함.
#   testpaths = tests: tests/ 디렉토리에서만 테스트 수집 (collection 속도 ↑)
#   addopts = -v ... : verbose + 짧은 traceback. CI 로그 가독성 향상.
[pytest]
pythonpath = .
testpaths = tests
addopts = -v --tb=short
