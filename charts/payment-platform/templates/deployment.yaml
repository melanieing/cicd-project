{{/*
charts/payment-platform/templates/deployment.yaml

각 service 의 Deployment 를 생성. range 로 .Values.services 를 순회해서 4 개 Deployment 가 한 파일에서 렌더링.

[Helm 템플릿 문법 메모]
  {{- range $name, $svc := .Values.services }}  : services map 을 (key, value) 로 순회
  $.Values                                       : range 안에서 root 컨텍스트 접근 (현재는 $svc 가 컨텍스트)
  {{- end }}                                     : range 종료
  {{- $g := $.Values.global -}}                  : 자주 쓰는 path 를 변수로 단축
  {{- if eq $name "transfer" }}                  : 조건문 (transfer 만 NOTIFICATION_URL 다르게)

[설계 포인트]
  1. spec.replicas 를 hpa.enabled=true 일 때 생략 → HPA 가 replica 관리 (HPA 와 Deployment 가 충돌 방지)
  2. RollingUpdate 는 maxSurge=1 / maxUnavailable=0 → 배포 중 가용성 유지
  3. SecurityContext 는 Dockerfile 의 UID 1001 과 정렬
  4. envFrom 으로 ConfigMap 전체를 env 에 주입 (env 추가 시 ConfigMap 만 수정)
  5. Probes 는 main.py 의 /health, /health/ready 와 일치
*/}}
{{- /* imageTag 가 비어있으면 즉시 fail (docs/registry.md §3.2 정책 강제). */ -}}
{{- include "payment-platform.requireImageTag" . -}}
{{- $g := .Values.global -}}
{{- range $name, $svc := .Values.services }}
{{- $svcCtx := merge (deepCopy $svc) (dict "name" $name) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # service 이름 그대로 사용 (account / transfer / loan / notification).
  # K8s Service 와 동일 이름이라 DNS 매핑이 직관적.
  name: {{ include "payment-platform.serviceFullname" $svcCtx }}
  labels:
    {{- include "payment-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  # HPA 가 replicas 를 관리할 때는 Deployment 의 replicas 를 생략해야 함.
  # 그렇지 않으면 helm 이 매번 replicas 를 default 로 reset → HPA 와 무한 핑퐁.
  {{- if not $g.hpa.enabled }}
  replicas: {{ $g.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ $g.rollingUpdate.maxSurge }}
      maxUnavailable: {{ $g.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "payment-platform.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "payment-platform.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        # version 라벨 — Istio DestinationRule 의 subset 매칭용 (Task 6.4-6.5 Canary 시연).
        # values.yaml 에 service 별 `version:` 이 정의되어 있으면 그 값을 쓰고, 없으면 "stable".
        # canary 측 Deployment 는 chart 가 아니라 istio/canary/transfer-canary.yaml 에서 별도로
        # 관리하며, 그 매니페스트가 같은 라벨 키 (version) 에 "canary" 를 박는다.
        version: {{ default "stable" $svc.version | quote }}
      # ---------------------------------------------------------------------------
      # Istio 사이드카 race 회피 (EPIC 6)
      # ---------------------------------------------------------------------------
      # 사이드카 (istio-proxy) 가 ready 가 되기 전에 메인 컨테이너 (uvicorn) 가 시작되면
      # outbound 연결 (postgres, 다른 서비스) 이 사이드카에 막혀 connection refused.
      # asyncpg 는 그 connection refused 를 transient 로 보지 않고 즉시 InvalidConnectError
      # 를 던지며, uvicorn 의 lifespan handler 는 그걸 받아 exit 3 로 종료 → CrashLoopBackOff.
      #
      # holdApplicationUntilProxyStarts: true 는 사이드카가 ready 를 알릴 때까지 메인
      # 컨테이너의 시작 자체를 늦춘다. namespace 에 istio-injection=enabled 라벨이 없으면
      # 이 annotation 은 그냥 무시되므로 해롭지 않다 (메시 미적용 환경에서도 안전).
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: {{ $g.serviceAccountName }}
      # GHCR 가 private 일 때만 의미. public 이면 imagePullSecrets 는 빈 리스트라 렌더 안 됨.
      {{- with $g.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $g.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          # image: <registry>/<service>:<tag>
          image: "{{ $g.imageRegistry }}/{{ $name }}:{{ $g.imageTag }}"
          imagePullPolicy: {{ $g.imagePullPolicy }}
          securityContext:
            {{- toYaml $g.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $g.containerPort }}
              protocol: TCP
          # ConfigMap 의 모든 키를 env 로 주입. service 별 차이(SERVICE_NAME / DOMAIN_ACTION 등)
          # 와 공통 env 모두 ConfigMap 에 들어가 있다 (configmap.yaml 참조).
          envFrom:
            - configMapRef:
                name: {{ include "payment-platform.serviceFullname" $svcCtx }}-config
          # DB 비밀번호만 별도 Secret 에서 주입 (보안 분리).
          #
          # [중요] env 변수 순서는 K8s 의 dependency resolve 에 영향.
          # `$(VAR)` substitution 은 같은 env 목록에서 **그 이전에 정의된 변수만** 참조 가능.
          # DATABASE_URL 안에 $(DB_PASSWORD) 를 쓰므로 DB_PASSWORD 가 먼저 와야 함.
          # 순서가 뒤바뀌면 kubelet 이 substitution 을 못 해 literal "$(DB_PASSWORD)" 가
          # asyncpg 에 password 로 전달되어 InvalidPasswordError → uvicorn exit 3.
          # See: docs/troubleshooting/2026-05-04-k8s-env-substitution-order.md
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://{{ $.Values.postgres.user }}:$(DB_PASSWORD)@{{ include "payment-platform.dbHost" $ }}:5432/{{ $svc.db }}"
            # SERVICE_VERSION — Canary 시연 (EPIC 6 Task 6.4-6.5) 용. transfer/main.py 의
            # /version 엔드포인트가 이 값을 응답에 그대로 노출하므로, 클라이언트가 응답을
            # 보고 stable / canary 어느 쪽으로 라우팅됐는지 식별 가능.
            # pod template label `version` 과 같은 값으로 일치시켜 두 채널 (라벨 + 응답) 을 정렬.
            - name: SERVICE_VERSION
              value: {{ default "stable" $svc.version | quote }}
          # Liveness — main.py 의 /health (DB 무관, 프로세스 생존 확인)
          livenessProbe:
            httpGet:
              path: {{ $g.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $g.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $g.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $g.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $g.probes.liveness.failureThreshold }}
          # Readiness — main.py 의 /health/ready (DB ping 포함)
          # DB 가 죽으면 503 → K8s 가 트래픽 차단 (Service endpoints 에서 자동 제외)
          readinessProbe:
            httpGet:
              path: {{ $g.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $g.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $g.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $g.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $g.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml $g.resources | nindent 12 }}
{{- end }}
