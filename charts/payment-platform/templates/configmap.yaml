{{/*
charts/payment-platform/templates/configmap.yaml

각 service 의 ConfigMap 을 생성. DATABASE_URL 만 secret 과 합성해야 해서 별도이고,
나머지 환경변수(SERVICE_NAME, DOMAIN_ACTION, NOTIFICATION_URL, LOG_LEVEL 등) 는 모두 여기에.

Deployment 의 envFrom: configMapRef 가 이 ConfigMap 의 모든 키를 env 로 주입.
*/}}
{{- $g := .Values.global -}}
{{- range $name, $svc := .Values.services }}
{{- $svcCtx := merge (deepCopy $svc) (dict "name" $name) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "payment-platform.serviceFullname" $svcCtx }}-config
  labels:
    {{- include "payment-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
data:
  # 서비스 자기 식별. main.py 가 /health 응답 등에서 사용.
  SERVICE_NAME: {{ $name | quote }}
  # 도메인 액션 라우트 path. main.py 가 POST /<DOMAIN_ACTION> 등록.
  DOMAIN_ACTION: {{ $svc.domainAction | quote }}
  # transfer 만 notification 호출. 나머지 service 는 빈 값으로 graceful skip.
  # 'from-template' sentinel 을 만나면 cluster DNS 로 변환.
  {{- if eq $svc.notificationUrl "from-template" }}
  NOTIFICATION_URL: {{ printf "http://notification.%s.svc.cluster.local:8000" $.Release.Namespace | quote }}
  {{- else }}
  NOTIFICATION_URL: {{ $svc.notificationUrl | quote }}
  {{- end }}
  # 공통 env (4 service 동일).
  LOG_LEVEL: {{ $g.env.LOG_LEVEL | quote }}
  DB_POOL_MIN: {{ $g.env.DB_POOL_MIN | quote }}
  DB_POOL_MAX: {{ $g.env.DB_POOL_MAX | quote }}
{{- end }}
