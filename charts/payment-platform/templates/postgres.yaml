{{/*
charts/payment-platform/templates/postgres.yaml

4 service 가 공유하는 단일 PostgreSQL StatefulSet 의 Helm 화 버전.
원본 plain manifest (Task 1.4) 에서 다음을 변경:
  - metadata.namespace 제거 → `helm install -n payment-dev` 의 release namespace 사용
  - image / 자격증명 / 자원 / PVC 크기 등을 .Values.postgres 에서 주입
  - init.sql 의 DB 목록을 .Values.postgres.databases 에서 동적 생성

[멱등성]
init.sql 이 \gexec + WHERE NOT EXISTS 로 작성되어 어떤 시점에 재실행해도 결과 동일.
2026-05-03 의 postgres-l-truncated 사건 (transfer_db missing) 의 후속 방어.

검증 명령:
  helm install payment . -n payment-dev -f values-dev.yaml
  kubectl -n payment-dev exec postgres-0 -- \
    psql -U payment -c "SELECT datname FROM pg_database ORDER BY datname;"
주의: `\l` 은 와이드 포맷이라 `kubectl exec -it` 의 TTY pager 와 만나면 마지막 행이 잘림.
*/}}

---
# 1) Secret — DB 사용자 / 비밀번호
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}

---
# 2) ConfigMap — postgres init 스크립트 (멱등)
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  init.sql: |
    -- DB 목록은 .Values.postgres.databases 에서 Helm range 로 동적 삽입된다.
    -- WHERE NOT EXISTS \gexec 패턴으로 멱등성 보장 (재실행해도 안전).
    SELECT format('CREATE DATABASE %I', d)
    FROM (VALUES
      {{- $last := sub (len .Values.postgres.databases) 1 -}}
      {{- range $i, $db := .Values.postgres.databases }}
        ({{ $db | squote }}){{- if ne $i $last }},{{ end }}
      {{- end }}
    ) AS t(d)
    WHERE NOT EXISTS (
        SELECT 1 FROM pg_database WHERE datname = d
    )
    \gexec

---
# 3) Headless Service — StatefulSet stable DNS
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: postgres
    {{- include "payment-platform.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# 4) ClusterIP Service — 4 service 의 DATABASE_URL host
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
    {{- include "payment-platform.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# 5) StatefulSet — Postgres pod
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  serviceName: postgres-headless
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "payment-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "payment-platform.selectorLabels" . | nindent 8 }}
      annotations:
        # Istio 사이드카 race 회피 (EPIC 6 에서 의미)
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      securityContext:
        # alpine postgres 의 uid/gid 70 — fsGroup 으로 PVC ownership 부여
        fsGroup: 70
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          # block sequence — IDE/YAML linter 가 inline flow 안의 Helm 템플릿 토큰을 항목으로 인식 못 하는 문제 회피.
          readinessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - {{ .Values.postgres.user | quote }}
                - "-h"
                - "127.0.0.1"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - {{ .Values.postgres.user | quote }}
                - "-h"
                - "127.0.0.1"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
