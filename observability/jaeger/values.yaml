# observability/jaeger/values.yaml
#
# Jaeger v2 (All-In-One) Helm chart override (EPIC 7 Task 7.4).
#
# Jaeger v2 의 핵심 변화 (v1 대비)
#   - 내부 구현이 OpenTelemetry Collector 기반으로 재구성
#   - "All-In-One" 한 개의 binary 가 OTLP receiver + processor + Jaeger storage + Query UI 다 처리
#     (v1 은 collector / agent / query / storage 분리되어 운영 복잡)
#   - OTLP 가 native protocol → Istio 의 Telemetry API 와 직접 통합 (extra collector 불필요)
#   - Helm chart 4.2.0+ 부터 v2 지원
#
# 본 프로젝트 정책
#   - kind 단일 호스트 + 시연 위주 → All-In-One 모드 사용 (replicas=1, in-memory storage)
#   - 운영에서는 Cassandra / Elasticsearch / Tempo backend 권장
#   - in-memory 라 pod 재시작 시 trace 데이터 휘발 (시연용 허용)
#
# Helm chart 출처
#   helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
#   helm repo update
#   helm search repo jaegertracing/jaeger
#
# 본 values 의 적용
#   helm upgrade --install jaeger jaegertracing/jaeger \
#     --version 4.2.0 \
#     --namespace observability \
#     -f observability/jaeger/values.yaml \
#     --wait --timeout 5m

# ============================================================
# v2 모드 활성화 — 본 chart 의 default 는 v1 일 수 있어 명시
# ============================================================
allInOne:
  enabled: true

  # Jaeger v2 binary 사용 명시 (chart 4.2.0+ 의 default 는 v2 지만 명시)
  image:
    tag: 2.10.0

  # All-In-One 은 단일 replica + in-memory storage
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

  # 추가 args — in-memory storage 의 trace 보존 시간 (default 1 일)
  # 시연 위주라 짧게 두면 메모리 절약
  extraEnv:
    - name: SPAN_STORAGE_TYPE
      value: memory
    - name: MEMORY_MAX_TRACES
      value: "100000"   # 약 200 MiB 헤드룸 안에서 안전한 상한

# ============================================================
# 분산 모드의 collector / agent / query 는 모두 비활성 (All-In-One 이 다 흡수)
# ============================================================
collector:
  enabled: false
agent:
  enabled: false
query:
  enabled: false
storage:
  type: memory   # PostgreSQL / Cassandra / Elasticsearch / Tempo / Kafka 등 가능

# ============================================================
# Provisioning — datasource 자동 등록 안 함 (Grafana 측에서 별도 ConfigMap 으로 추가 권장)
# ============================================================
provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

# ============================================================
# Service — Istio Telemetry 가 OTLP 로 trace 를 보낼 endpoint
# ============================================================
# All-In-One pod 는 다음 포트들을 노출:
#   4317  : OTLP gRPC (Istio 가 사용)
#   4318  : OTLP HTTP
#   16686 : Query UI (port-forward 로 접근)
#   14269 : metrics (Prometheus scrape)
# default 로 모두 ClusterIP service 가 생성됨.
